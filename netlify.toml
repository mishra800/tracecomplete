[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://trace-backed-1.onrender.com/api"
  VITE_API_TIMEOUT = "10000"
  VITE_APP_NAME = "Trace Network & Engineering"
  VITE_APP_URL = "https://tracenetwork.in"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_ENABLE_CHATBOT = "true"
  VITE_GA_TRACKING_ID = "G-5QYGDDYL0Q"

[[redirects]]
  from = "/api/*"
  to = "https://trace-backed-1.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://trace-backed-1.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
