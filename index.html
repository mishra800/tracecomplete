    <!-- Re-initialize Swiper after React renders -->
    <script>
        // Wait for React to render, then call the thmSwiperInit function from script.js
        window.addEventListener('load', function() {
            // Use MutationObserver to detect when React adds the slider
            const observer = new MutationObserver(function(mutations) {
                const swiperElement = document.querySelector('.thm-swiper__slider');
                if (swiperElement && typeof thmSwiperInit === 'function') {
                    console.log('🎯 Slider element detected, initializing Swiper...');
                    observer.disconnect(); // Stop observing
                    setTimeout(function() {
                        thmSwiperInit();
                        console.log('✅ thmSwiperInit() called');
                    }, 100);
                }
            });
            
            // Start observing
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
            
            // Fallback: try after 1 second
            setTimeout(function() {
                if (document.querySelector('.thm-swiper__slider') && typeof thmSwiperInit === 'function') {
                    console.log('🔄 Fallback: Calling thmSwiperInit()');
                    thmSwiperInit();
                }
            }, 1000);
        });
    </script>

    <script>
        document.querySelector('#contactForm').addEventListener('submit', async function (event) {
            event.preventDefault(); // stop default form submit

            const form = event.target;
            const resultDiv = document.querySelector('.result');

            // Validate required fields manually
            const requiredFields = form.querySelectorAll('[required]');
            let allValid = true;

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    allValid = false;
                    field.style.borderColor = 'red';
                } else {
                    field.style.borderColor = '';
                }
            });

            if (!allValid) {
                resultDiv.innerHTML = '<p style="color: red;">Please fill in all required fields.</p>';
                return;
            }

            try {
                const response = await fetch("https://api.web3forms.com/submit", {
                    method: 'POST',
                    body: new FormData(form),
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = '<p style="color: green;">Thank you! Your message has been sent successfully.</p>';
                    setTimeout(() => {
                        form.reset();
                        resultDiv.innerHTML = '';
                    }, 3000);
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">Oops! Something went wrong: ${data.message || 'Please try again.'}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">Error submitting form. Please check your connection and try again.</p>';
            }
        });
    </script>
    <script>
        const track = document.querySelector('.partner-slider-track');
        let slides = document.querySelectorAll('.partner-slide');
        const prevBtn = document.querySelector('.partner-arrow.prev');
        const nextBtn = document.querySelector('.partner-arrow.next');

        let slideWidth = slides[0].offsetWidth;
        let position = 0;

        // Clone slides for infinite scroll
        slides.forEach(slide => {
            const clone = slide.cloneNode(true);
            track.appendChild(clone);
        });

        // Update slide width on resize
        function updateSlideWidth() {
            slideWidth = document.querySelector('.partner-slide').offsetWidth;
        }
        window.addEventListener('resize', updateSlideWidth);

        // Next slide
        function nextSlide() {
            position -= slideWidth;
            if (Math.abs(position) >= track.scrollWidth / 2) {
                position = 0;
                track.style.transition = 'none';
                track.style.transform = `translateX(${position}px)`;
                void track.offsetWidth;
                track.style.transition = 'transform 0.5s ease';
            }
            track.style.transform = `translateX(${position}px)`;
        }

        // Previous slide
        function prevSlide() {
            if (position === 0) {
                position = -track.scrollWidth / 2;
                track.style.transition = 'none';
                track.style.transform = `translateX(${position}px)`;
                void track.offsetWidth;
                track.style.transition = 'transform 0.5s ease';
            }
            position += slideWidth;
            track.style.transform = `translateX(${position}px)`;
        }

        // Auto scroll
        let autoScroll = setInterval(nextSlide, 3000);

        // Arrow control
        nextBtn.addEventListener('click', () => {
            clearInterval(autoScroll);
            nextSlide();
            autoScroll = setInterval(nextSlide, 3000);
        });

        prevBtn.addEventListener('click', () => {
            clearInterval(autoScroll);
            prevSlide();
            autoScroll = setInterval(nextSlide, 3000);
        });

        // Initial update
        updateSlideWidth();
    </script>

<script>
// SHOW AFTER 10 SECONDS
setTimeout(function() {
  // Never show on admin or login pages
  var path = window.location.pathname.toLowerCase();
  if (path.indexOf('admin') !== -1 || path.indexOf('login') !== -1) {
    return;
  }

  var popup = document.getElementById("vaptPopup");
  var box = document.getElementById("popupBox");

  if (popup && box) {
    popup.style.display = "flex";

    setTimeout(function(){
      popup.style.opacity = "1";
      box.style.transform = "scale(1) translateY(0)";
    }, 50);

    // CLOSE AFTER 60 SECONDS
    setTimeout(function() {
      closePopup();
    }, 60000);
  }
}, 10000);

// Periodically check if we are on an admin or login page and auto-hide
setInterval(function() {
  var path = window.location.pathname.toLowerCase();
  if (path.indexOf('admin') !== -1 || path.indexOf('login') !== -1) {
    var rawPopup = document.getElementById("vaptPopup");
    if (rawPopup && rawPopup.style.display !== "none") {
      rawPopup.style.display = "none";
    }
  }
}, 500);

// CLOSE FUNCTION
function closePopup(){
  var popup = document.getElementById("vaptPopup");
  var box = document.getElementById("popupBox");

  if (popup && box) {
    popup.style.opacity = "0";
    box.style.transform = "scale(0.7) translateY(30px)";

    setTimeout(function(){
      popup.style.display = "none";
    }, 400);
  }
}

// REDIRECT FUNCTION
function goToContact(){
  closePopup();
  setTimeout(function(){
    window.location.href = "contact-us.html";
  }, 400);
}
</script>
